name: CI - Code Quality
on: [push]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '../../backend/package-lock.json'
      - run: npm ci
      - run: npm run lint # Vérifie le style du code